syntax = "proto3";

package aleph.p2p.v1;

// Control and pubsub API of the aleph.im P2P service.
// Errors are returned as gRPC statuses:
// - Dial: NOT_FOUND (peer unreachable), FAILED_PRECONDITION (peer id mismatch),
//   INVALID_ARGUMENT (bad peer id / multiaddr), INTERNAL (other).
// - Publish: INVALID_ARGUMENT (bad topic), INTERNAL (gossipsub error).
service AlephP2P {
  // Local node identity and addresses.
  rpc Identify(IdentifyRequest) returns (IdentifyResponse);
  // Dial a remote peer. Returns once the connection is established or failed.
  rpc Dial(DialRequest) returns (DialResponse);
  // Publish a message on a gossipsub topic. With echo=true, the message is
  // also delivered to local Subscribe streams for this topic.
  rpc Publish(PublishRequest) returns (PublishResponse);
  // Subscribe to a gossipsub topic. Server stream of received messages.
  // The per-subscriber buffer is bounded; on overflow the oldest messages
  // are dropped and counted in metrics.
  rpc Subscribe(SubscribeRequest) returns (stream PubsubEnvelope);
  // Replace the full set of preferred peers (registry-backed CCNs).
  // Preferred peers are protected from pruning and receive a gossipsub
  // application score bonus. The set is capped server-side.
  rpc SetPreferredPeers(SetPreferredPeersRequest) returns (SetPreferredPeersResponse);
  // List currently connected peers.
  rpc GetPeers(GetPeersRequest) returns (GetPeersResponse);
  // Fetch hash-addressed content from peers. Server-streaming: the content
  // is delivered in chunks. NOT_FOUND is returned when no peer could serve
  // the content within the deadline.
  rpc Fetch(FetchRequest) returns (stream FetchChunk);
}

message IdentifyRequest {}

message IdentifyResponse {
  string peer_id = 1;
  repeated string listen_multiaddrs = 2;
  repeated string external_multiaddrs = 3;
}

message DialRequest {
  string peer_id = 1;
  string multiaddr = 2;
}

message DialResponse {}

message PublishRequest {
  string topic = 1;
  bytes payload = 2;
  bool echo = 3;
}

message PublishResponse {}

message SubscribeRequest {
  string topic = 1;
}

message PubsubEnvelope {
  string topic = 1;
  // Peer ID of the original message author (gossipsub signed source),
  // not the peer the message was relayed through.
  string source_peer_id = 2;
  bytes payload = 3;
  // Local reception time, milliseconds since the Unix epoch.
  uint64 received_at_millis = 4;
}

message PreferredPeer {
  string peer_id = 1;
  // Dial hints for this peer, multiaddr format.
  repeated string multiaddrs = 2;
}

message SetPreferredPeersRequest {
  repeated PreferredPeer peers = 1;
}

message SetPreferredPeersResponse {
  uint32 accepted = 1;
  // Number of entries dropped because of the protected-share cap.
  uint32 truncated = 2;
}

message GetPeersRequest {}

message GetPeersResponse {
  repeated PeerInfo peers = 1;
}

message PeerInfo {
  string peer_id = 1;
  repeated string multiaddrs = 2;
  bool preferred = 3;
  double score = 4;
}

message FetchRequest {
  string item_hash = 1;
  repeated string preferred_peer_ids = 2;
}

message FetchChunk {
  bytes data = 1;
  uint64 total_size = 2;
}
